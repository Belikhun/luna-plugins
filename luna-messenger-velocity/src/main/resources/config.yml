chat:
  default-context: network
  network-channel-aliases: [nw]
  server-channel-aliases: [sv]

# ================================================
# Placeholder Reference (LunaMessenger Velocity)
# ================================================
# Global notes:
# - Chỉ hỗ trợ placeholder nội bộ dạng: %key%
# - Placeholder chưa được cung cấp giá trị sẽ giữ nguyên trong output
# - Placeholder có thể dùng theo từng ngữ cảnh bên dưới
#
# 1) Channel/Chat format placeholders
#    - %sender_name%: Tên người gửi
#    - %player_display%: Tên hiển thị người chơi theo formats.user-display-format
#    - %sender_display%: Tên hiển thị người gửi theo formats.user-display-format
#    - %receiver_display%: Tên hiển thị người nhận theo formats.user-display-format
#    - %server_name%: Tên backend server hiện tại (Velocity)
#    - %server_display%: Tên hiển thị server (map từ server-displays)
#    - %server_color%: Màu nhấn của server (map từ server-colors)
#    - %channel_name%: Tên kênh (ví dụ: network/server/direct)
#    - %message%: Nội dung tin nhắn
#    - %player_avatar_url%: URL avatar đã render từ webhook.avatar-url-format

# 1.1) Server switch broadcast placeholders
#    - %sender_name%: Tên người chơi vừa chuyển server
#    - %from_server%: Tên server gốc
#    - %to_server%: Tên server đích
#    - %from_display%: Tên hiển thị server gốc
#    - %to_display%: Tên hiển thị server đích
#    - %server_display%: Alias của server đích
#
# 2) Direct message format placeholders
#    - %sender_name%: Tên người gửi
#    - %target_name%: Tên người nhận
#    - %server_name%: Tên server hiện tại của người gửi
#    - %channel_name%: direct
#    - %message%: Nội dung tin nhắn
#    - %player_avatar_url%: URL avatar của người tương ứng
#
# 3) Discord inbound -> network placeholders
#    - %discord_author%: Tên tác giả từ Discord
#    - %channel_name%: Tên kênh network (discord.network-channel-name)
#    - %message%: Nội dung tin nhắn Discord
#    - %discord_source%: Nguồn inbound (bot/webhook bridge)
#    - %discord_message_id%: ID message từ Discord
#    - %discord_author_id%: ID tác giả từ Discord
#
# 4) Discord webhook placeholders (outbound)
#    - %user_name% (tên hiển thị chính)
#    - %user_username% (username gốc)
#    - %user_nickname% (nickname/hiển thị)
#    - %target_name% (DM context)
#    - %server_name%
#    - %server_display%
#    - %server_color%
#    - %channel_name%
#    - %message%
#    - %discord_author% (chỉ inbound render)
#    - %discord_content% (nội dung outbound-network đã render)
#    - %player_avatar_url%
#
# 5) Third-party placeholders
#    - Ví dụ: %skinsrestorer_texture_id_or_steve%
#    - LunaMessenger KHÔNG tự đăng ký placeholder này.
#      Nếu plugin khác không resolve, chuỗi placeholder sẽ giữ nguyên.

# Discord bridge modes:
# - bot mode (discord.bot.enabled=true): dùng bot token + channel-ids để nhận/gửi.
# - webhook mode: gửi outbound qua discord.webhook.urls.

mentions:
  enabled: true
  # true: chỉ match @<tên_chính_xác>; false: để mở rộng cho chế độ khác trong tương lai
  exact-username-only: true
  # Sound phát cho người được nhắc; hỗ trợ tên có namespace hoặc không (mặc định minecraft:)
  sound: ENTITY_PLAYER_LEVELUP
  # Format thay thế cho token @name trong nội dung chat (hỗ trợ %name%)
  highlight-format: "&e@%name%&r"
  # Tin nhắn ping riêng cho người được nhắc (hỗ trợ %sender_name%, %target_name%)
  alert-format: "<yellow>⚠ <white>%sender_name%</white> đã nhắc đến bạn.</yellow>"
  # Cấu hình toast/title khi có mention (được proxy gửi qua metadata)
  toast:
    enabled: true
    title: "<yellow>Bạn được nhắc đến</yellow>"
    subtitle: "<white>%sender_name%</white> vừa nhắc bạn trong chat"
    fade-in-ms: 200
    stay-ms: 2000
    fade-out-ms: 300

# Ẩn join/leave/switch của một số người chơi khỏi chat network mặc định.
# Người gửi và người xem đều cần permission này để nhìn thấy các bản tin đã ẩn.
silent-broadcast:
  enabled: true
  permission: "lunamessenger.silentbroadcast"
  prefix: "<dark_gray>[xuỵt]</dark_gray> "

# Alias hiển thị cho server backend. Có thể dùng MiniMessage.
server-displays:
  lobby: "<gradient:#FFDE9A:#FFBC53:#FFDF47>SẢNH</gradient>"
  survival: "<gradient:#AC92FE:#25EED0>SMP</gradient>"
  event: "<gradient:#bafdc1:#9BC1F9>EVENT1</gradient>"
  event2: "<gradient:#9863E7:#FCD05C>EV</gradient><gradient:#FCD05C:#5FE2C5>ENT2</gradient>"
  iceboat: "<gradient:#E5C09A:#FFC2DD>BOAT</gradient> <gradient:#0CC6C7:#1EA9FB>RACING</gradient>"
  infdun: "<gradient:#31ADAD:#8CE67C>INFINITY DUNGEONS</gradient>"
  manhunt: "<gradient:#EC8C8C:#FFC58B>M</gradient><gradient:#FFC58B:#FFFF9E>A</gradient><gradient:#FFFF9E:#9AFF9A>NH</gradient><gradient:#9AFF9A:#97CFF5>U</gradient><gradient:#97CFF5:#A39AFF>N</gradient><gradient:#A39AFF:#EEA0FF>T</gradient>"

# Màu nhấn cho từng backend server.
# Dùng với placeholder %server_color% trong format khi cần.
server-colors:
  default: "#F1FF68"
  lobby: "#F1FF68"
  survival: "#AC92FE"
  event: "#B3E5FF"
  event2: "#9863E7"
  iceboat: "#E5C09A"
  infdun: "#31ADAD"
  manhunt: "#A39AFF"

formats:
  # Format tập trung để hiển thị người chơi, dùng cho %player_display%/%sender_display%/%receiver_display%.
  # Placeholder dùng được: %player_prefix%, %displayname%, %player_name% và third-party placeholders.
  user-display-format: "%player_prefix% %displayname%"

  defaults:
    # Placeholder dùng được: %player_name%, %player_prefix%, %player_display%, %server_name%, %channel_name%, %message%, %player_avatar_url%
    channel:
      network: "<color:%server_color%>⏺</color> <gray>[<gold>N</gold>]</gray> %player_display% <gray><bold>>></bold></gray> <white>%message%</white>"
      server: "<color:%server_color%>⏺</color> <gray>[<aqua>%server_display%</aqua>]</gray> %player_display% <gray><bold>>></bold></gray> <white>%message%</white>"
    broadcast:
      # Placeholder dùng được: %sender_name%, %server_name%, %channel_name%, %server_color%, %message%
      format: "<gray>[<gold>THÔNG BÁO</gold>]</gray> <white>%message%</white>"
    presence:
      first-join:
        # Placeholder dùng được: %sender_name%, %player_name%, %displayname%, %player_prefix%, %player_display%, %sender_display%, %server_name%, %server_display%, %server_color%, %message%
        format: "<gray>[<green>++<gray>]<reset> %player_display%"
      join:
        # Placeholder dùng được: %sender_name%, %player_name%, %displayname%, %player_prefix%, %player_display%, %sender_display%, %server_name%, %server_display%, %server_color%, %message%
        format: "<gray>[<green>+<gray>]<reset> %player_display%"
      leave:
        # Placeholder dùng được: %sender_name%, %player_name%, %displayname%, %player_prefix%, %player_display%, %sender_display%, %server_name%, %server_display%, %server_color%, %player_playtime%, %message%
        format: "<gray>[<red>-<gray>]<reset> %player_display%"
      server-switch:
        enabled: true
        # Placeholder dùng được: %sender_name%, %displayname%, %player_prefix%, %player_display%, %sender_display%, %from_server%, %to_server%, %from_display%, %to_display%, %from%, %to%, %from_clean%, %to_clean%, %server_display%, %server_color%
        format: "<gray>[<yellow>%from_display%</yellow> <white><bold>-></bold> <blue>%to_display%</blue><gray>]</gray> %player_display%"
    # Placeholder dùng được: %sender_name%, %target_name%, %player_display%, %sender_display%, %receiver_display%, %server_name%, %channel_name%, %message%, %player_avatar_url%
    direct:
      to-sender: "<gray>[DM] Bạn nhắn cho</gray> %receiver_display%<gray>:</gray>"
      to-receiver: "<gray>[DM]</gray> %sender_display% <gray>nhắn cho bạn:</gray>"
    # Placeholder dùng được tương tự direct.
    reply:
      to-sender: "<gray>[DM] Bạn trả lời</gray> %receiver_display%<gray>:</gray>"
      to-receiver: "<gray>[DM]</gray> %sender_display% <gray>trả lời bạn:</gray>"
    # inbound-network: %discord_author%, %channel_name%, %message%
    discord:
      inbound-network: "<gray>[<color:#5865F2>#%channel_name%</color>]</gray> <light_purple>%discord_author%</light_purple> <gray><bold>>></bold></gray> <white>%message%</white>"
      outbound-network: "%message%"

discord:
  enabled: false
  network-channel-name: network

  retry:
    # Tổng số lần thử cho mỗi outbound message (bao gồm lần đầu).
    max-attempts: 3
    # Thời gian chờ giữa các lần thử (ms).
    delay-ms: 500

  bot:
    # Bật bridge Discord qua bot token (JDA).
    # Khi bật, plugin sẽ lắng nghe/gửi ở tất cả channel-id được cấu hình.
    # Dùng channel-ids để cấu hình danh sách nhiều channel.
    # Tin nhắn gửi vào một channel sẽ được sync sang các channel còn lại.
    enabled: false
    token: ""
    channel-ids: []
    # Bỏ qua tin của bot để tránh echo-loop.
    ignore-bot-messages: true
    # Nhãn nguồn dùng cho attribution/anti-loop trong inbound path.
    source-id: "discord-bot-jda"

    presence-updater:
      # Presence dùng khi proxy đang khởi động.
      use-starting-presence: true
      starting-presence:
        # Giá trị hợp lệ: online, idle, do_not_disturb, invisible
        status: do_not_disturb

        # Tên activity chính (dòng chính).
        activity-name: "Đang khởi động..."
        # Dòng chi tiết 1 và 2 sẽ được ghép vào activity text khi hiển thị trên Discord.
        detail-line-1: ""
        detail-line-2: ""

        # Tùy chọn chi tiết activity.
        # activity-type hợp lệ: playing, listening, watching, competing, streaming
        activity-type: "playing"
        # Chỉ dùng khi activity-type=streaming.
        stream-url: ""

        # Legacy field cũ (không dùng nữa).
        activity: "Đang khởi động..."

      # Presence dùng khi proxy đang dừng.
      use-stopping-presence: true
      stopping-presence:
        # Giá trị hợp lệ: online, idle, do_not_disturb, invisible
        status: idle

        # Tên activity chính (dòng chính).
        activity-name: "Đang dừng..."
        # Dòng chi tiết 1 và 2 sẽ được ghép vào activity text khi hiển thị trên Discord.
        detail-line-1: ""
        detail-line-2: ""

        # Tùy chọn chi tiết activity.
        # activity-type hợp lệ: playing, listening, watching, competing, streaming
        activity-type: "playing"
        # Chỉ dùng khi activity-type=streaming.
        stream-url: ""

        # Legacy field cũ (không dùng nữa).
        activity: "Đang dừng..."

      # Chu kỳ cập nhật presence (giây). Tối thiểu: 30.
      updater-rate-in-seconds: 90
      presences:
        - # Giá trị hợp lệ: online, idle, do_not_disturb, invisible
          status: online

          # Tên activity chính (dòng chính).
          activity-name: "Minecraft"
          # Dòng chi tiết 1 và 2 sẽ được ghép vào activity text khi hiển thị trên Discord.
          detail-line-1: ""
          detail-line-2: ""

          # Tùy chọn chi tiết activity.
          # activity-type hợp lệ: playing, listening, watching, competing, streaming
          activity-type: "playing"
          # Chỉ dùng khi activity-type=streaming.
          stream-url: ""

          # Legacy field cũ (không dùng nữa).
          activity: "playing Minecraft"

  webhook:
    # Discord webhook endpoint(s) dùng để gửi chat/join/leave với username/avatar tùy biến.
    # Dùng urls để cấu hình danh sách nhiều endpoint.
    # Khi cấu hình nhiều endpoint, plugin sẽ gửi tới tất cả endpoint.
    urls: []
    # Placeholder dùng được: %player_prefix%, %player_name%, %player_display%, %user_name%, %user_username%, %user_nickname%, %target_name%, %server_name%, %server_display%, %channel_name%, %message%, %player_avatar_url%, %discord_content%
    # Prefix sẽ được tự động strip toàn bộ định dạng (MiniMessage/legacy) trước khi gửi Discord.
    username-format: "[%server_display%] %luckperms_prefix% %user_name%"
    # Placeholder dùng được tương tự username-format.
    # Có thể dùng third-party token như %skinsrestorer_texture_id_or_steve%.
    avatar-url-format: "https://visage.surgeplay.com/bust/128/<skinsrestorer_texture_id_or_steve>.png"

  outbound:
    # Chỉ tin nhắn kênh network được gửi ra Discord.
    network:
      message:
        enabled: true
        mode: text # text | embed
        # Placeholder dùng được: %user_name%, %user_username%, %user_nickname%, %server_name%, %server_display%, %channel_name%, %message%, %player_avatar_url%, %discord_content%
        content: "%discord_content%"
        embed:
          # Placeholder dùng được giống content
          author: ""
          author-url: ""
          author-icon-url: ""
          title: ""
          description: "%discord_content%"
          color: "#58B2FF"
          thumbnail-url: "%player_avatar_url%"
          image-url: ""

    # Join/leave network gửi ra Discord với format riêng.
    join-leave:
      join:
        enabled: true
        mode: embed # text | embed
        # Placeholder dùng được: %user_name%, %user_username%, %user_nickname%, %server_name%, %server_display%, %channel_name%, %message%, %player_avatar_url%
        content: "<gray>[<green>+<gray>]</gray> %user_name%"
        embed:
          # Placeholder dùng được giống content
          author: ""
          author-url: ""
          author-icon-url: ""
          title: "Đã kết nối vào máy chủ"
          description: "<gray>[<green>+<gray>]</gray> %user_name%"
          color: "#3D8C40"
          thumbnail-url: "%player_avatar_url%"
          image-url: ""
      leave:
        enabled: true
        mode: embed # text | embed
        # Placeholder dùng được: %user_name%, %user_username%, %user_nickname%, %server_name%, %server_display%, %channel_name%, %player_playtime%, %message%, %player_avatar_url%
        content: "<gray>[<red>-<gray>]</gray> %user_name%"
        embed:
          # Placeholder dùng được giống content
          author: ""
          author-url: ""
          author-icon-url: ""
          title: "Đã ngắt kết nối khỏi máy chủ"
          description: "<gray>[<red>-<gray>]</gray> %user_name%"
          color: "#FF0000"
          thumbnail-url: "%player_avatar_url%"
          image-url: ""
      switch:
        enabled: true
        mode: embed # text | embed
        # Placeholder dùng được: %user_name%, %user_username%, %user_nickname%, %from_server%, %to_server%, %from_display%, %to_display%, %server_name%, %server_display%, %channel_name%, %message%, %player_avatar_url%
        content: "<gray>[<yellow>%from_display%</yellow> <white><bold>-></bold> <blue>%to_display%</blue><gray>] %user_name%"
        embed:
          # Placeholder dùng được giống content
          author: ""
          author-url: ""
          author-icon-url: ""
          title: "Đã chuyển máy chủ"
          description: "<gray>[<yellow>%from_display%</yellow> <white><bold>-></bold> <blue>%to_display%</blue><gray>] %user_name%"
          color: "#444444"
          thumbnail-url: "%player_avatar_url%"
          image-url: ""

# Chống spam phía proxy (authoritative).
rate-limit:
  enabled: true
  # Cooldown tối thiểu giữa 2 tin bất kỳ của cùng một người chơi.
  cooldown-ms: 500
  # Cửa sổ thời gian để tính burst (ms).
  window-ms: 5000
  # Số tin tối đa trong một cửa sổ window-ms.
  max-messages: 6
  # Người có permission này sẽ bỏ qua giới hạn.
  bypass-permission: "lunamessenger.bypass.ratelimit"
