name: LunaCore
version: ${version}
main: dev.belikhun.luna.core.paper.LunaCorePlugin
loader: dev.belikhun.luna.core.paper.loader.LunaCoreLibraryLoader
api-version: '1.21'
description: Common APIs, utilities, and helpers for Luna plugins.
authors:
  - Belikhun
permissions:
  lunacore.admin:
    default: op
    description: Quyền quản trị Luna Core.
commands:
  lunacorepaper:
    description: Quản trị Luna Core.
    usage: /lunacorepaper [reload]
    aliases:
      - lcp
    permission: lunacore.admin
dependencies:
  server:
    spark:
      load: BEFORE
      required: true
      join-classpath: true
    Vault:
      required: true
    LuckPerms:
      required: true
    PlaceholderAPI:
      required: true
    ProtocolLib:
      required: true
    voicechat:
      load: BEFORE
      required: false
      join-classpath: true
