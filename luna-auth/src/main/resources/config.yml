logging:
  ansi: true
  debug: false
  auth-flow: true

auth:
  backend-handshake:
    required: true
    required-backends: []
    # Ví dụ:
    # required-backends: ["lobby"]
    deny-message: "Hệ thống xác thực đang khởi tạo. Vui lòng thử lại sau vài giây."
  max-failures: 5
  lockout-seconds: 120
  session-after-disconnect-seconds: 10800
  login-history-retention-days: 7
  hashing:
    pbkdf2:
      iterations: 210000
      salt-bytes: 16
      key-bits: 256
  quick-login:
    mixed-mode:
      enabled: true
      premium-uuid: true
      uuid-override-map: {}
      # uuid-override-map:
      #   "11111111-1111-1111-1111-111111111111": "22222222-2222-2222-2222-222222222222"
      premium-check-timeout-ms: 3000
      premium-name-cache-minutes: 60
