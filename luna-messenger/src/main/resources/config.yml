logging:
  # Bật/tắt log mức debug cho LunaMessenger Paper.
  debug: false

request:
  timeout:
    # Bật/tắt timeout cho các yêu cầu gửi lên proxy.
    enabled: true
    # Thời gian tối đa chờ phản hồi từ proxy (milliseconds).
    millis: 6000
    # Chu kỳ quét pending requests (ticks).
    check-interval-ticks: 20

placeholder-api:
  # Các key PlaceholderAPI sẽ được export về proxy để dùng trong chat format.
  # Dùng dạng không có dấu %, ví dụ: luckperms_prefix => %luckperms_prefix%.
  export-keys:
    - luckperms_prefix
    - luckperms_suffix
    - luckperms_primary_group_name
    - vault_prefix
    - vault_suffix
    - vault_primary_group
    - player_displayname
