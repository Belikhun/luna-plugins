name: LunaCountdown
main: dev.belikhun.luna.countdown.Countdown
author: Belikhun
version: '${version}'
api-version: '1.20'

dependencies:
  server:
    LunaCore:
      required: true

permissions:
  countdown.*:
    description: "Toàn bộ quyền cho Countdown"
    children:
      countdown.countdown: true
      countdown.shutdown: true
  countdown.countdown:
    description: "Cho phép bắt đầu đếm ngược"
    default: op
  countdown.shutdown:
    description: "Cho phép tắt máy chủ"
    default: op
