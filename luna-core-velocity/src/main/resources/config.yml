configVersion: 4

database:
  enabled: true
  type: "mariadb"
  host: "127.0.0.1"
  port: 3306
  name: "luna"
  username: "root"
  password: ""
  options:
    useSSL: false
    serverTimezone: "UTC"

http:
  enabled: true
  host: "0.0.0.0"
  port: 32452
  pathPrefix: "/api"

heartbeat:
  timeoutSeconds: 20

diagnostics:
  selector:
    enabled: true
    fail-on-validation-error: true
    unknown-placeholder-as-error: false

strings:
  user-display-format: "%player_prefix% %displayname%"
  money:
    currencySymbol: '<#FCF0A0>⛃</#FCF0A0>'
    grouping: true
    format: '<#FFDFD4><b>{amount}</b></#FFDFD4> {symbol}'

logging:
  ansi: true
  defaultScope: "LunaCoreVelocity"
  level: "INFO"
  heartbeatTransport:
    enabled: false
  pluginMessaging:
    enabled: false

messaging:
  rabbitmq:
    enabled: false
    uri: "amqp://guest:guest@127.0.0.1:5672/%2F"
    exchange: "luna.plugin-messaging"
    proxyQueue: "luna.proxy.messaging"
    backendQueuePrefix: "luna.backend."
    connectionTimeoutMillis: 5000
    requestedHeartbeatSeconds: 15

# Luna placeholders (Velocity, MiniPlaceholders):
#   format: <luna:key>
#   examples:
#     <luna:online_servers>
#     <luna:total_players>
#     <luna:player_name>
#     <luna:player_group_name>
#     <luna:player_group_display>
#     <luna:player_prefix>
#     <luna:player_suffix>
#     <luna:player_display>
#     <luna:server_status_survival>
#     <luna:server_online_survival>
#     <luna:server_max_survival>
#     <luna:server_tps_survival>
#     <luna:server_version_survival>
#     <luna:server_display_survival>
#     <luna:server_color_survival>
#     <luna:server_whitelist_survival>
# Luna player display format:
#   path: strings.user-display-format
#   supported built-in placeholders:
#     %player_prefix% %player_suffix% %player_group_name% %player_group_display% %displayname% %player_name%
#   MiniPlaceholders tokens are also resolved when available and a player context exists.
