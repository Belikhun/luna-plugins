name: LunaShop
version: ${version}
main: dev.belikhun.luna.shop.LunaShopPlugin
api-version: '1.21'
description: Shop plugin for Luna server.
authors:
  - Belikhun
permissions:
  lunashop.admin:
    default: op
    description: Quyền quản trị Luna Shop.
commands:
  shop:
    description: Mở cửa hàng Luna.
    usage: /shop [search <từ_khóa>|category <tên_danh_mục>]
    aliases: [buy, store, b]
  shopadmin:
    description: Quản trị vật phẩm shop.
    usage: /shopadmin <add|category|limit|remove|list|history|reload|open>
    permission: lunashop.admin
  lunashop:
    description: Quản trị và reload Luna Shop.
    usage: /lunashop [reload]
    permission: lunashop.admin
dependencies:
  server:
    LunaCore:
      load: BEFORE
      required: true
      join-classpath: true
    Vault:
      load: BEFORE
      required: true
